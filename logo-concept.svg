<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#333" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DA8FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#4DA8FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#FFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="820" fill="url(#bg)"/>
  <rect width="900" height="820" fill="url(#ambient)"/>

  <!-- ============================================ -->
  <!-- 主 Logo: K 标志 + 文字 -->
  <!-- ============================================ -->
  <g transform="translate(60, 70)">
    <!--
      K 标志设计: "Reply-K"
      - 竖线 = 主干，笔直坚定
      - 上斜线 = 向外发出 (像发送消息)
      - 下斜线 = 弯曲折回成回复箭头 (收到回复)
      - 交汇点 = AI 智能节点 (蓝色脉冲)
      - 竖线上下不闭合，留呼吸感
    -->
    <g transform="translate(0, 0)">
      <!-- 竖线 (主干) - 上下留白 -->
      <line x1="24" y1="8" x2="24" y2="60" stroke="white" stroke-width="4" stroke-linecap="round"/>

      <!-- 上斜线 - 向右上发出 -->
      <line x1="24" y1="22" x2="58" y2="6" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

      <!-- 下斜线 - 先向右下, 再折回成箭头 -->
      <path d="M 24 42 L 58 60"
            fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <!-- 折回箭头尖 -->
      <polyline points="52,54 58,60 52,66"
                fill="none" stroke="white" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>

      <!-- AI 节点 (三线交汇处) -->
      <circle cx="24" cy="32" r="4.5" fill="url(#accent)"/>
      <!-- 脉冲光环 -->
      <circle cx="24" cy="32" r="10" fill="none" stroke="#4DA8FF" stroke-width="0.8" opacity="0.35"/>
      <circle cx="24" cy="32" r="16" fill="none" stroke="#4DA8FF" stroke-width="0.4" opacity="0.12"/>
    </g>

    <!-- 文字 -->
    <text x="85" y="46" font-family="'SF Pro Display','Inter',sans-serif" font-size="32" font-weight="600" fill="white" letter-spacing="1">Kuki<span fill="#4DA8FF"> AI</span></text>
    <text x="87" y="66" font-family="'SF Pro Display','Inter',sans-serif" font-size="10" font-weight="400" fill="#666" letter-spacing="2">AI 评论回复助手</text>
  </g>

  <!-- ============================================ -->
  <!-- App Icon -->
  <!-- ============================================ -->
  <g transform="translate(420, 70)">
    <rect x="0" y="0" width="110" height="110" rx="26" fill="#141414" stroke="#FFF" stroke-opacity="0.1" stroke-width="1"/>
    <g transform="translate(26, 24)">
      <line x1="24" y1="8" x2="24" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="24" y1="22" x2="56" y2="6" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 24 42 L 56 58" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <polyline points="50,52 56,58 50,64" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24" cy="32" r="4.5" fill="url(#accent)"/>
      <circle cx="24" cy="32" r="10" fill="none" stroke="#4DA8FF" stroke-width="0.8" opacity="0.35"/>
      <circle cx="24" cy="32" r="16" fill="none" stroke="#4DA8FF" stroke-width="0.4" opacity="0.12"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- Favicon 圆形 -->
  <!-- ============================================ -->
  <g transform="translate(590, 70)">
    <circle cx="55" cy="55" r="54" fill="#141414" stroke="#FFF" stroke-opacity="0.1" stroke-width="1"/>
    <g transform="translate(22, 22)">
      <line x1="24" y1="8" x2="24" y2="58" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="24" y1="22" x2="56" y2="6" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 24 42 L 56 58" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <polyline points="50,52 56,58 50,64" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="24" cy="32" r="4.5" fill="url(#accent)"/>
      <circle cx="24" cy="32" r="10" fill="none" stroke="#4DA8FF" stroke-width="0.8" opacity="0.35"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- K 字标 (最简) -->
  <!-- ============================================ -->
  <g transform="translate(710, 70)">
    <rect x="0" y="0" width="130" height="110" rx="26" fill="#0D0D0D" stroke="#FFF" stroke-opacity="0.06" stroke-width="1"/>
    <g transform="translate(36, 20)">
      <!-- 极简 K 字标 -->
      <line x1="8" y1="4" x2="8" y2="66" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="8" y1="18" x2="52" y2="4" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <line x1="8" y1="42" x2="52" y2="66" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- AI 节点 (交汇处) -->
      <circle cx="8" cy="30" r="5" fill="url(#accent)"/>
      <circle cx="8" cy="30" r="11" fill="none" stroke="#4DA8FF" stroke-width="0.7" opacity="0.3"/>
    </g>
  </g>

  <!-- ===== 分隔 ===== -->
  <line x1="60" y1="220" x2="840" y2="220" stroke="#FFF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- K 标志创新变体探索 -->
  <!-- ============================================ -->
  <g transform="translate(60, 270)">
    <text x="0" y="0" font-family="'SF Pro Display','Inter',sans-serif" font-size="11" font-weight="500" fill="#555" letter-spacing="4">K MARK · 标志变体探索</text>

    <!-- 变体 A: Reply-K (当前选择) -->
    <rect x="0" y="20" width="195" height="110" rx="12" fill="url(#cardBg2)" stroke="#4DA8FF" stroke-opacity="0.28" stroke-width="1.5"/>
    <g transform="translate(50, 32)">
      <line x1="22" y1="8" x2="22" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="22" y1="20" x2="54" y2="6" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M 22 40 L 54 54" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <polyline points="48,48 54,54 48,60" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="22" cy="30" r="4" fill="url(#accent)"/>
      <circle cx="22" cy="30" r="9" fill="none" stroke="#4DA8FF" stroke-width="0.7" opacity="0.3"/>
    </g>
    <text x="97" y="115" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="9" fill="#4DA8FF" letter-spacing="1">Reply-K</text>

    <!-- 变体 B: Slash-K -->
    <rect x="215" y="20" width="195" height="110" rx="12" fill="url(#cardBg)" stroke="url(#border)" stroke-width="1"/>
    <g transform="translate(50, 32)">
      <!-- 只用斜线构成的 K, 竖线被省略, 形成负空间 -->
      <line x1="14" y1="6" x2="14" y2="56" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
      <!-- 上斜线 -->
      <line x1="14" y1="16" x2="54" y2="4" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <!-- 下斜线 -->
      <line x1="14" y1="44" x2="54" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <!-- 交汇点光点 -->
      <circle cx="14" cy="30" r="5" fill="url(#accent)"/>
    </g>
    <text x="312" y="115" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="9" fill="#555" letter-spacing="1">Slash-K</text>

    <!-- 变体 C: Circuit-K -->
    <rect x="430" y="20" width="195" height="110" rx="12" fill="url(#cardBg)" stroke="url(#border)" stroke-width="1"/>
    <g transform="translate(50, 32)">
      <!-- 电路板风格的 K: 直角转折 -->
      <path d="M 12 8 L 12 56" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <!-- 上臂: 竖直→水平 (电路板走线风格) -->
      <path d="M 12 18 L 40 18 L 40 6" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- 下臂: 竖直→水平 -->
      <path d="M 12 44 L 40 44 L 40 56" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- 节点 -->
      <circle cx="12" cy="18" r="3" fill="url(#accent)"/>
      <circle cx="12" cy="44" r="3" fill="url(#accent)"/>
      <circle cx="12" cy="30" r="3.5" fill="white"/>
    </g>
    <text x="527" y="115" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="9" fill="#555" letter-spacing="1">Circuit-K</text>

    <!-- 变体 D: Pulse-K -->
    <rect x="645" y="20" width="195" height="110" rx="12" fill="url(#cardBg)" stroke="url(#border)" stroke-width="1"/>
    <g transform="translate(50, 32)">
      <!-- 断层 K: 竖线断开, 用光点连接 -->
      <line x1="16" y1="6" x2="16" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="16" y1="36" x2="16" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <!-- 斜线 -->
      <line x1="16" y1="16" x2="54" y2="6" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <line x1="16" y1="44" x2="54" y2="56" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- 断口处的 AI 光点 -->
      <circle cx="16" cy="31" r="5" fill="url(#accent)"/>
      <circle cx="16" cy="31" r="12" fill="none" stroke="#4DA8FF" stroke-width="0.6" opacity="0.25"/>
    </g>
    <text x="742" y="115" text-anchor="middle" font-family="'SF Pro Display',sans-serif" font-size="9" fill="#555" letter-spacing="1">Pulse-K</text>
  </g>

  <!-- ============================================ -->
  <!-- Design Tokens -->
  <!-- ============================================ -->
  <g transform="translate(60, 440)">
    <text x="0" y="0" font-family="'SF Pro Display','Inter',sans-serif" font-size="11" font-weight="500" fill="#555" letter-spacing="4">DESIGN TOKENS</text>

    <!-- 色板 -->
    <text x="0" y="26" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#444" letter-spacing="2">COLORS</text>

    <rect x="0" y="36" width="52" height="32" rx="4" fill="white"/>
    <text x="62" y="50" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#666">White</text>
    <text x="62" y="61" font-family="'SF Mono',monospace" font-size="8" fill="#444">#FFFFFF</text>

    <rect x="148" y="36" width="52" height="32" rx="4" fill="#4DA8FF"/>
    <text x="210" y="50" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#666">Accent Blue</text>
    <text x="210" y="61" font-family="'SF Mono',monospace" font-size="8" fill="#444">#4DA8FF</text>

    <rect x="310" y="36" width="52" height="32" rx="4" fill="#7C3AED"/>
    <text x="372" y="50" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#666">Purple</text>
    <text x="372" y="61" font-family="'SF Mono',monospace" font-size="8" fill="#444">#7C3AED</text>

    <rect x="472" y="36" width="52" height="32" rx="4" fill="#0A0A0A" stroke="#FFF" stroke-opacity="0.1" stroke-width="1"/>
    <text x="534" y="50" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#666">Background</text>
    <text x="534" y="61" font-family="'SF Mono',monospace" font-size="8" fill="#444">#0A0A0A</text>

    <rect x="634" y="36" width="52" height="32" rx="4" fill="#141414" stroke="#FFF" stroke-opacity="0.08" stroke-width="1"/>
    <text x="696" y="50" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#666">Surface</text>
    <text x="696" y="61" font-family="'SF Mono',monospace" font-size="8" fill="#444">#141414</text>

    <!-- 字体 -->
    <text x="0" y="106" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#444" letter-spacing="2">TYPOGRAPHY</text>
    <text x="0" y="122" font-family="'SF Pro Display','Inter',sans-serif" font-size="12" font-weight="500" fill="#888">SF Pro Display · Inter · PingFang SC</text>
    <text x="0" y="138" font-family="'SF Mono',monospace" font-size="9" fill="#444">SF Mono — for code, data, technical content</text>

    <!-- 间距 -->
    <text x="0" y="168" font-family="'SF Pro Text',sans-serif" font-size="9" fill="#444" letter-spacing="2">SPACING SCALE</text>
    <text x="0" y="184" font-family="'SF Mono',monospace" font-size="9" fill="#555">4 · 8 · 12 · 16 · 24 · 32 · 48 · 64</text>
  </g>

  <!-- ============================================ -->
  <!-- 名称确认 + 域名建议 -->
  <!-- ============================================ -->
  <g transform="translate(60, 555)">
    <text x="0" y="0" font-family="'SF Pro Display','Inter',sans-serif" font-size="11" font-weight="500" fill="#555" letter-spacing="4">NAME</text>

    <rect x="0" y="18" width="280" height="72" rx="10" fill="url(#cardBg2)" stroke="#4DA8FF" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="22" y="48" font-family="'SF Pro Display','Inter',sans-serif" font-size="26" font-weight="600" fill="white" letter-spacing="1">Kuki<span fill="#4DA8FF"> AI</span></text>
    <text x="24" y="66" font-family="'PingFang SC',sans-serif" font-size="9" fill="#555" letter-spacing="2">AI 评论回复助手</text>
    <rect x="254" y="40" width="16" height="16" rx="4" fill="#4DA8FF" opacity="0.8"/>

    <rect x="300" y="18" width="250" height="72" rx="10" fill="url(#cardBg)" stroke="url(#border)" stroke-width="1"/>
    <text x="22" y="48" font-family="'SF Pro Display','Inter',sans-serif" font-size="22" font-weight="600" fill="#888" letter-spacing="1">kuki.ai</text>
    <text x="24" y="66" font-family="'PingFang SC',sans-serif" font-size="9" fill="#555" letter-spacing="2">建议域名</text>

    <rect x="570" y="18" width="250" height="72" rx="10" fill="url(#cardBg)" stroke="url(#border)" stroke-width="1"/>
    <text x="22" y="48" font-family="'SF Pro Display','Inter',sans-serif" font-size="22" font-weight="600" fill="#888" letter-spacing="1">getkuki.ai</text>
    <text x="24" y="66" font-family="'PingFang SC',sans-serif" font-size="9" fill="#555" letter-spacing="2">备选域名</text>
  </g>

  <!-- ============================================ -->
  <!-- 品牌故事 / 理念 -->
  <!-- ============================================ -->
  <g transform="translate(60, 690)">
    <text x="0" y="0" font-family="'SF Pro Display','Inter',sans-serif" font-size="11" font-weight="500" fill="#555" letter-spacing="4">KUKI — THE K MARK</text>

    <text x="0" y="28" font-family="'PingFang SC',sans-serif" font-size="13" fill="#888">K 的三笔：发送 · 接收 · 智能回复</text>
    <text x="0" y="48" font-family="'SF Pro Text','Inter',sans-serif" font-size="10" fill="#444">"One K. Three strokes. Infinite replies."</text>

    <rect x="0" y="68" width="88" height="28" rx="6" fill="url(#cardBg2)" stroke="url(#border)" stroke-width="0.5"/>
    <text x="18" y="86" font-family="'SF Pro Text','PingFang SC',sans-serif" font-size="10" fill="#888">极简 Min</text>

    <rect x="98" y="68" width="88" height="28" rx="6" fill="url(#cardBg2)" stroke="url(#border)" stroke-width="0.5"/>
    <text x="16" y="86" font-family="'SF Pro Text','PingFang SC',sans-serif" font-size="10" fill="#888">锐利 Sharp</text>

    <rect x="196" y="68" width="88" height="28" rx="6" fill="url(#cardBg2)" stroke="#4DA8FF" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="16" y="86" font-family="'SF Pro Text','PingFang SC',sans-serif" font-size="10" fill="#4DA8FF">智能 AI</text>
  </g>
</svg>