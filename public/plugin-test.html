<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>插件测试 - 模拟淘宝评价管理</title>
<style>
  body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background: #f5f5f5; padding: 20px; }
  .page-header { background: #ff5000; color: #fff; padding: 12px 16px; margin: -20px -20px 20px; font-size: 16px; font-weight: 600; }
  .review-item { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px; position: relative; }
  .buyer { font-weight: 600; }
  .stars { color: #ff9500; margin: 4px 0; }
  .content { color: #333; margin: 8px 0; padding: 10px; background: #fafafa; border-radius: 6px; }
  .product { font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="page-header">🐱 千牛卖家中心 - 评价管理</div>

<div class="review-item">
  <div class="buyer">张先生</div>
  <div class="stars">★★★★★</div>
  <div class="product">商品：智能蓝牙耳机</div>
  <div class="content">质量非常好，物流也很快，已经是第二次购买了！音质比预期的好很多，续航也很给力。</div>
</div>

<div class="review-item">
  <div class="buyer">李女士</div>
  <div class="stars">★☆☆☆☆</div>
  <div class="product">商品：USB-C 充电线</div>
  <div class="content">用了不到一周就坏了，充电口接触不良，充不进去电。质量太差了！要求退货退款。</div>
</div>

<div class="review-item">
  <div class="buyer">王同学</div>
  <div class="stars">★★★☆☆</div>
  <div class="product">商品：无线鼠标</div>
  <div class="content">鼠标手感还行，就是包装有点简陋，盒子被压扁了一块。还好鼠标没坏。</div>
</div>

<p style="text-align:center;color:#999;margin-top:20px;">✨ 注意每条评论右上角是否出现 AI回复 按钮</p>
</body>
</html>
