<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口碑助手 - 功能展示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(160deg, #F8F6F3 0%, #FFF5ED 50%, #FEF0E1 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 50px 80px;
    position: relative; overflow: hidden;
  }
  .bg-pattern {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,140,66,0.06) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(255,107,53,0.05) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,184,108,0.04) 0%, transparent 50%);
  }
  .header { position: relative; z-index: 10; text-align: center; margin-bottom: 40px; }
  .header h2 {
    font-size: 42px; font-weight: 900; color: #2D1B0E; letter-spacing: 2px;
  }
  .header h2 span {
    background: linear-gradient(135deg, #FF6B35, #E8551A);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { font-size: 18px; color: #8B6F5E; margin-top: 8px; }
  .grid {
    position: relative; z-index: 10;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 28px; width: 100%; max-width: 1000px;
  }
  .feature-card {
    background: #fff; border-radius: 20px; padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.05);
    transition: transform 0.2s;
  }
  .feature-card:hover { transform: translateY(-2px); }
  .feature-icon {
    width: 56px; height: 56px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 16px;
  }
  .icon-1 { background: linear-gradient(135deg, #FFF0E5, #FFE0CC); }
  .icon-2 { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .icon-3 { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
  .feature-card h3 {
    font-size: 22px; font-weight: 700; color: #2D1B0E; margin-bottom: 8px;
  }
  .feature-card p {
    font-size: 15px; color: #8B6F5E; line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-pattern"></div>
  <div class="header">
    <h2>三大核心<span>功能</span></h2>
    <p>简单三步，把差评变成好口碑</p>
  </div>
  <div class="grid">
    <div class="feature-card">
      <div class="feature-icon icon-1">📋</div>
      <h3>粘贴差评</h3>
      <p>复制大众点评、美团、小红书上的差评，一键粘贴到口碑助手</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon icon-2">🤖</div>
      <h3>AI 生成回复</h3>
      <p>AI 理解差评内容，10 秒生成真诚、专业的回复，语气自然不机械</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon icon-3">📤</div>
      <h3>一键复制发布</h3>
      <p>点击复制，回到平台粘贴发布。每天免费 3 条，够用再升级</p>
    </div>
  </div>
</div>
</body>
</html>
