<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口碑助手 - 定价</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 600px; overflow: hidden;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .card {
    width: 800px; height: 600px;
    background: linear-gradient(160deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 50px 60px;
    position: relative; overflow: hidden;
    color: #fff;
  }
  .glow-1 {
    position: absolute; top: -150px; right: -80px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,66,0.15) 0%, transparent 70%);
  }
  .glow-2 {
    position: absolute; bottom: -120px; left: -60px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
  }
  .header { position: relative; z-index: 10; text-align: center; margin-bottom: 30px; }
  .header .badge {
    display: inline-block; border: 1px solid rgba(255,140,66,0.4);
    color: #FFB86C; padding: 6px 20px; border-radius: 20px;
    font-size: 14px; font-weight: 600; margin-bottom: 16px;
  }
  .header h2 { font-size: 36px; font-weight: 900; }
  .header h2 span { color: #FF8C42; }
  .pricing-cards {
    position: relative; z-index: 10;
    display: flex; gap: 24px; align-items: center;
  }
  .plan {
    width: 280px; border-radius: 20px; padding: 32px 28px;
    text-align: center; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
  }
  .plan.free { border-color: rgba(255,255,255,0.1); }
  .plan.pro {
    border-color: rgba(255,140,66,0.5);
    background: rgba(255,140,66,0.08);
    box-shadow: 0 0 40px rgba(255,107,53,0.15);
  }
  .plan h3 { font-size: 20px; margin-bottom: 16px; color: #ccc; }
  .plan.pro h3 { color: #FF8C42; }
  .plan .price {
    font-size: 48px; font-weight: 900; margin-bottom: 4px;
  }
  .plan .price .yen { font-size: 24px; vertical-align: super; }
  .plan .price .period { font-size: 16px; font-weight: 400; color: #999; }
  .plan .desc { font-size: 14px; color: #999; margin-bottom: 20px; }
  .plan ul {
    list-style: none; text-align: left; margin-bottom: 24px;
  }
  .plan ul li {
    padding: 8px 0; font-size: 14px; color: #ccc;
    display: flex; align-items: center; gap: 8px;
  }
  .plan ul li .check { color: #4CAF50; font-weight: 700; }
  .btn {
    display: inline-block; padding: 12px 32px; border-radius: 25px;
    font-size: 16px; font-weight: 700; text-decoration: none;
    cursor: pointer;
  }
  .btn-outline {
    border: 1px solid rgba(255,255,255,0.3); color: #fff;
  }
  .btn-primary {
    background: linear-gradient(135deg, #FF6B35, #E8551A);
    color: #fff; box-shadow: 0 6px 24px rgba(255,107,53,0.3);
  }
  .trust { position: relative; z-index: 10; margin-top: 28px; text-align: center; }
  .trust p { font-size: 14px; color: #888; margin-bottom: 6px; }
  .trust .tags { display: flex; gap: 12px; justify-content: center; }
  .trust .tag {
    font-size: 12px; color: #666; padding: 4px 12px;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="header">
    <div class="badge">💎 简单定价</div>
    <h2>选择适合你的<span>方案</span></h2>
  </div>
  <div class="pricing-cards">
    <!-- Free Plan -->
    <div class="plan free">
      <h3>🆓 免费版</h3>
      <div class="price"><span class="yen">¥</span>0<span class="period">/月</span></div>
      <div class="desc">适合偶尔有差评的店</div>
      <ul>
        <li><span class="check">✓</span> 每天 3 条 AI 回复</li>
        <li><span class="check">✓</span> 多平台支持</li>
        <li><span class="check">✓</span> 真诚自然语气</li>
        <li><span class="check">✓</span> 无需绑卡</li>
      </ul>
      <a class="btn btn-outline" href="https://reviewai.chat">免费试用</a>
    </div>
    <!-- Pro Plan -->
    <div class="plan pro">
      <h3>⭐ 专业版</h3>
      <div class="price"><span class="yen">¥</span>99<span class="period">/月</span></div>
      <div class="desc">适合重视口碑的门店</div>
      <ul>
        <li><span class="check">✓</span> 无限次 AI 回复</li>
        <li><span class="check">✓</span> 多平台支持</li>
        <li><span class="check">✓</span> 优先客服支持</li>
        <li><span class="check">✓</span> 回复历史记录</li>
      </ul>
      <a class="btn btn-primary" href="https://reviewai.chat">立即升级 →</a>
    </div>
  </div>
  <div class="trust">
    <p>已帮助 500+ 门店回复差评</p>
    <div class="tags">
      <span class="tag">🛡️ 不满意随时退</span>
      <span class="tag">📞 7×12 客服支持</span>
      <span class="tag">🔒 数据安全保障</span>
    </div>
  </div>
</div>
</body>
</html>
