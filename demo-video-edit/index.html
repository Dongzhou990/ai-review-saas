<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  :root {
    --bg: #060608;
    --purple: #7c3aed;
    --cyan: #06b6d4;
    --white: #e8e8f0;
    --dim: #6b6b80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    margin:0; width:1440px; height:900px; overflow:hidden;
    background: var(--bg);
    font-family: system-ui, sans-serif;
  }

  /* Background ambient */
  .bg-glow {
    position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 60%, rgba(124,58,237,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 75% 25%, rgba(6,182,212,0.06) 0%, transparent 70%);
  }

  /* Scene containers */
  .scene {
    position:absolute; top:0; left:0; width:1440px; height:900px;
    overflow:hidden; opacity:0; visibility:hidden;
  }

  .scene img {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:1100px; height:auto;
    border-radius:12px;
    box-shadow:0 0 80px rgba(124,58,237,0.25), 0 0 30px rgba(6,182,212,0.1);
  }

  /* Text overlays */
  .overlay {
    position:absolute; z-index:20; pointer-events:none;
  }

  /* Title card */
  .title-block {
    position:absolute; z-index:30; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; visibility:hidden;
  }
  .title-block .icon { font-size:64px; margin-bottom:16px; }
  .title-block h1 {
    font-size:72px; font-weight:900; letter-spacing:-0.04em;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:8px;
  }
  .title-block .sub {
    font-size:26px; font-weight:300; color:var(--dim);
    letter-spacing:0.08em;
  }

  /* Text banner */
  .text-banner {
    position:absolute; z-index:25; opacity:0; visibility:hidden;
    padding:16px 36px;
    background:rgba(6,6,8,0.88);
    border:1px solid rgba(124,58,237,0.2);
    border-radius:16px;
    backdrop-filter:blur(16px);
  }
  .text-banner h2 {
    font-size:34px; font-weight:700; color:var(--white);
    letter-spacing:-0.02em; line-height:1.3;
  }
  .text-banner .highlight {
    background:linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    font-weight:900;
  }

  /* Feature tag */
  .tag {
    position:absolute; z-index:25; opacity:0; visibility:hidden;
    display:flex; align-items:center; gap:8px;
    padding:8px 22px;
    background:rgba(6,6,8,0.85);
    border:1px solid rgba(6,182,212,0.25);
    border-radius:40px;
    backdrop-filter:blur(10px);
  }
  .tag .dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
  .tag span { font-size:15px; font-weight:500; color:var(--white); }

  /* Step card */
  .step-card {
    position:absolute; z-index:25; opacity:0; visibility:hidden;
    padding:20px 28px;
    background:rgba(6,6,8,0.85);
    border:1px solid rgba(124,58,237,0.2);
    border-radius:14px;
    backdrop-filter:blur(12px);
  }
  .step-card .num {
    font-size:13px; font-weight:700; color:var(--purple);
    letter-spacing:0.1em; margin-bottom:4px;
  }
  .step-card h3 {
    font-size:26px; font-weight:700; color:var(--white);
    letter-spacing:-0.02em;
  }

  /* CTA */
  .cta-block {
    position:absolute; z-index:40; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; visibility:hidden;
  }
  .cta-card {
    text-align:center;
    padding:48px 72px;
    background:rgba(6,6,8,0.92);
    border:1px solid rgba(124,58,237,0.3);
    border-radius:24px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 80px rgba(124,58,237,0.2);
  }
  .cta-card h2 {
    font-size:52px; font-weight:900; letter-spacing:-0.03em;
    background:linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:10px;
  }
  .cta-card p { font-size:22px; font-weight:300; color:var(--dim); margin-bottom:20px; }
  .cta-card .url {
    font-size:20px; font-weight:500; color:var(--cyan);
    padding:12px 32px;
    border:1px solid rgba(6,182,212,0.25);
    border-radius:50px;
  }

  /* Progress bar */
  .progress {
    position:absolute; bottom:0; left:0; z-index:50;
    height:3px;
    background:linear-gradient(90deg, var(--purple), var(--cyan));
    width:0;
  }

  /* Corner lines */
  .corner { position:absolute; z-index:5; opacity:0.3; }
  .corner.tl { top:20px; left:20px; border-top:1px solid var(--purple); border-left:1px solid var(--purple); width:40px; height:40px; }
  .corner.br { bottom:20px; right:20px; border-bottom:1px solid var(--purple); border-right:1px solid var(--purple); width:40px; height:40px; }
</style>
</head>
<body>

<div id="root" data-composition-id="kuki-demo-pro" data-width="1440" data-height="900" data-start="0" data-duration="48">

  <div class="bg-glow"></div>
  <div class="corner tl"></div>
  <div class="corner br"></div>
  <div class="progress" id="progress" style="width:0"></div>

  <!-- ═══ SCENE 0: Title (0-4.5s) ═══ -->
  <div class="title-block" id="titleBlock">
    <div class="icon">🤖</div>
    <h1>口碑助手</h1>
    <div class="sub">AI 智能回复差评 · 一站式口碑管理</div>
  </div>

  <!-- ═══ SCENE 1: Problem + Landing (3.5-11s) ═══ -->
  <div class="scene" id="sc1">
    <img id="imgLanding" src="media/landing.png" alt="landing">
  </div>
  <div class="text-banner" id="banner1" style="top:60px; left:80px;">
    <h2>顾客<span class="highlight">差评</span>太多<br>回复不过来？</h2>
  </div>
  <div class="text-banner" id="banner1b" style="top:60px; left:80px; display:none;">
    <h2>AI 帮你<span class="highlight">30秒</span><br>生成专业回复</h2>
  </div>

  <!-- ═══ SCENE 2: Feature - Review Reply (10-24s) ═══ -->
  <div class="scene" id="sc2">
    <img id="imgReviews" src="media/reviews.png" alt="reviews">
  </div>
  <div class="step-card" id="step1" style="top:50px; right:70px;">
    <div class="num">STEP 1</div>
    <h3>粘贴顾客差评</h3>
  </div>
  <div class="step-card" id="step2" style="top:180px; right:70px;">
    <div class="num">STEP 2</div>
    <h3>选择回复风格</h3>
  </div>
  <div class="step-card" id="step3" style="top:310px; right:70px;">
    <div class="num">STEP 3</div>
    <h3>AI 一键生成</h3>
  </div>

  <!-- ═══ SCENE 3: Styles (23-33s) ═══ -->
  <div class="scene" id="sc3">
    <img id="imgRegister" src="media/register.png" alt="register">
  </div>
  <div class="text-banner" id="banner3" style="top:80px; left:100px; background:rgba(6,6,8,0.9);">
    <h2>多种<span class="highlight">回复风格</span></h2>
  </div>
  <div class="tag" id="tag1" style="top:220px; left:120px;"><div class="dot"></div><span>诚恳道歉</span></div>
  <div class="tag" id="tag2" style="top:280px; left:120px;"><div class="dot"></div><span>专业解释</span></div>
  <div class="tag" id="tag3" style="top:340px; left:120px;"><div class="dot"></div><span>温暖关怀</span></div>

  <!-- ═══ SCENE 4: Dashboard (32-40s) ═══ -->
  <div class="scene" id="sc4">
    <img id="imgDashboard" src="media/dashboard.png" alt="dashboard">
  </div>
  <div class="text-banner" id="banner4" style="top:60px; right:80px;">
    <h2><span class="highlight">好评邀约</span></h2>
  </div>
  <div class="text-banner" id="banner4b" style="top:60px; right:80px; display:none;">
    <h2><span class="highlight">数据看板</span><br>实时追踪口碑变化</h2>
  </div>

  <!-- ═══ SCENE 5: CTA (39-48s) ═══ -->
  <div class="cta-block" id="ctaBlock">
    <div class="cta-card">
      <h2>开启智能口碑管理</h2>
      <p>让 AI 帮你高效处理每一条顾客评价</p>
      <div class="url">reviewai.chat</div>
    </div>
  </div>

</div>

<script>
var tl = gsap.timeline({paused:true});
var D = 48;

// Progress bar
tl.to("#progress", {width:"100%", duration:D, ease:"none"}, 0);
// Ambient glow
tl.fromTo(".bg-glow", {opacity:0.6}, {opacity:1, duration:4, repeat:12, yoyo:true, ease:"sine.inOut"}, 0);

// ═══ SCENE 0: Title ═══
tl.set("#titleBlock", {visibility:"visible"}, 0.1);
tl.fromTo("#titleBlock", {opacity:0, scale:0.95}, {opacity:1, scale:1, duration:0.6, ease:"power3.out"}, 0.3);
tl.to("#titleBlock", {opacity:0, duration:0.35}, 3.8);
tl.set("#titleBlock", {visibility:"hidden"}, 4.2);

// ═══ SCENE 1: Problem + Landing ═══
tl.set("#sc1", {visibility:"visible"}, 3.6);
tl.to("#sc1", {opacity:1, duration:0.45, ease:"power2.out"}, 4.0);
// Ken Burns zoom on landing image
tl.fromTo("#imgLanding", {scale:1}, {scale:1.06, duration:10, ease:"sine.inOut"}, 4.0);

// Banner 1: problem
tl.set("#banner1", {visibility:"visible"}, 4.3);
tl.fromTo("#banner1", {x:40, opacity:0}, {x:0, opacity:1, duration:0.45, ease:"power2.out"}, 4.5);
tl.to("#banner1", {opacity:0, duration:0.3}, 7.5);
tl.set("#banner1", {visibility:"hidden", display:"none"}, 7.9);

// Banner 1b: solution
tl.set("#banner1b", {visibility:"visible", display:"block"}, 7.6);
tl.fromTo("#banner1b", {x:40, opacity:0}, {x:0, opacity:1, duration:0.45, ease:"power2.out"}, 7.8);
tl.to("#banner1b", {opacity:0, duration:0.3}, 10.2);
tl.set("#banner1b", {visibility:"hidden", display:"none"}, 10.6);

// Exit scene 1
tl.to("#sc1", {opacity:0, duration:0.35}, 10.3);
tl.set("#sc1", {visibility:"hidden"}, 10.7);

// ═══ SCENE 2: Review Reply ═══
tl.set("#sc2", {visibility:"visible"}, 10.5);
tl.to("#sc2", {opacity:1, duration:0.45, ease:"power2.out"}, 10.8);
tl.fromTo("#imgReviews", {scale:1}, {scale:1.08, duration:14, ease:"sine.inOut"}, 10.8);

// Steps cascade
tl.set("#step1", {visibility:"visible"}, 11.2);
tl.fromTo("#step1", {x:30, opacity:0}, {x:0, opacity:1, duration:0.35, ease:"power2.out"}, 11.4);
tl.set("#step2", {visibility:"visible"}, 12.2);
tl.fromTo("#step2", {x:30, opacity:0}, {x:0, opacity:1, duration:0.35, ease:"power2.out"}, 12.4);
tl.set("#step3", {visibility:"visible"}, 13.2);
tl.fromTo("#step3", {x:30, opacity:0}, {x:0, opacity:1, duration:0.35, ease:"power2.out"}, 13.4);

// Fade out steps
tl.to("#step1", {opacity:0, duration:0.25}, 22.5);
tl.to("#step2", {opacity:0, duration:0.25}, 22.7);
tl.to("#step3", {opacity:0, duration:0.25}, 22.9);
tl.set("#step1", {visibility:"hidden"}, 22.8);
tl.set("#step2", {visibility:"hidden"}, 23.0);
tl.set("#step3", {visibility:"hidden"}, 23.2);

// Exit scene 2
tl.to("#sc2", {opacity:0, duration:0.35}, 23.2);
tl.set("#sc2", {visibility:"hidden"}, 23.6);

// ═══ SCENE 3: Styles ═══
tl.set("#sc3", {visibility:"visible"}, 23.4);
tl.to("#sc3", {opacity:1, duration:0.45, ease:"power2.out"}, 23.7);
tl.fromTo("#imgRegister", {scale:1}, {scale:1.06, duration:10, ease:"sine.inOut"}, 23.7);

// Banner + tags
tl.set("#banner3", {visibility:"visible"}, 24.0);
tl.fromTo("#banner3", {x:-30, opacity:0}, {x:0, opacity:1, duration:0.4, ease:"power2.out"}, 24.2);
tl.set("#tag1", {visibility:"visible"}, 24.8);
tl.fromTo("#tag1", {x:-20, opacity:0}, {x:0, opacity:1, duration:0.3, ease:"power2.out"}, 25.0);
tl.set("#tag2", {visibility:"visible"}, 25.5);
tl.fromTo("#tag2", {x:-20, opacity:0}, {x:0, opacity:1, duration:0.3, ease:"power2.out"}, 25.7);
tl.set("#tag3", {visibility:"visible"}, 26.2);
tl.fromTo("#tag3", {x:-20, opacity:0}, {x:0, opacity:1, duration:0.3, ease:"power2.out"}, 26.4);

// Fade all
tl.to("#banner3,#tag1,#tag2,#tag3", {opacity:0, duration:0.3}, 31.5);
tl.set("#banner3,#tag1,#tag2,#tag3", {visibility:"hidden"}, 31.9);

// Exit scene 3
tl.to("#sc3", {opacity:0, duration:0.35}, 31.7);
tl.set("#sc3", {visibility:"hidden"}, 32.1);

// ═══ SCENE 4: Dashboard ═══
tl.set("#sc4", {visibility:"visible"}, 31.9);
tl.to("#sc4", {opacity:1, duration:0.45, ease:"power2.out"}, 32.2);
tl.fromTo("#imgDashboard", {scale:1}, {scale:1.07, duration:8, ease:"sine.inOut"}, 32.2);

// Banner 4
tl.set("#banner4", {visibility:"visible"}, 32.6);
tl.fromTo("#banner4", {x:30, opacity:0}, {x:0, opacity:1, duration:0.4, ease:"power2.out"}, 32.8);
tl.to("#banner4", {opacity:0, duration:0.3}, 36.0);
tl.set("#banner4", {visibility:"hidden", display:"none"}, 36.4);

// Banner 4b
tl.set("#banner4b", {visibility:"visible", display:"block"}, 36.1);
tl.fromTo("#banner4b", {x:30, opacity:0}, {x:0, opacity:1, duration:0.4, ease:"power2.out"}, 36.3);
tl.to("#banner4b", {opacity:0, duration:0.3}, 38.8);
tl.set("#banner4b", {visibility:"hidden", display:"none"}, 39.2);

// Exit scene 4
tl.to("#sc4", {opacity:0, duration:0.35}, 38.9);
tl.set("#sc4", {visibility:"hidden"}, 39.3);

// ═══ SCENE 5: CTA ═══
tl.set("#ctaBlock", {visibility:"visible"}, 39.0);
tl.fromTo("#ctaBlock", {opacity:0, scale:0.95}, {opacity:1, scale:1, duration:0.6, ease:"power3.out"}, 39.3);
// Hold to end
tl.to({}, {duration:4}, 43.0);

window.__timelines = window.__timelines || {};
window.__timelines["kuki-demo-pro"] = tl;
</script>
</body>
</html>
