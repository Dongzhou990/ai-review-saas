<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuki AI</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup">
  <div class="header">
    <span class="logo">🐱 Kuki AI</span>
    <span class="version">v2.0</span>
  </div>

  <div class="state">
    <p class="subtitle">AI 电商评论智能回复</p>

    <div class="actions">
      <button id="btn-login-web" class="btn-primary">🔐 登录 Kuki AI</button>
      <button id="btn-open-app" class="btn-secondary" style="display:none;">📊 打开管理后台</button>
    </div>

    <div class="platform-hint">
      <p>💡 支持平台自动识别：</p>
      <div class="platforms">
        <span>🛒 淘宝</span><span>🎵 抖音</span><span>📱 拼多多</span>
        <span>🏪 京东</span><span>✈️ 携程</span><span>🏨 去哪儿</span>
        <span>🍜 美团</span><span>🐷 飞猪</span>
      </div>
      <p style="font-size:11px;color:#999;margin-top:8px;">
        打开商家后台 → 查看评论 → 点"✨ AI回复"<br>
        未登录会自动跳转登录页
      </p>
    </div>

    <button id="btn-reload" class="btn-ghost">🔄 重新加载插件</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
