<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuki AI</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup">
  <!-- Header -->
  <div class="header">
    <span class="logo">🐱 Kuki AI</span>
    <span class="version">v1.0</span>
  </div>

  <!-- Logged Out State -->
  <div id="logged-out" class="state">
    <p class="subtitle">AI 电商评论智能回复</p>
    <div class="form">
      <input type="email" id="email" placeholder="邮箱" class="input">
      <input type="password" id="password" placeholder="密码" class="input">
      <button id="btn-login" class="btn-primary">登录</button>
      <p class="hint">没有账号？<a href="https://reviewai.chat/register" target="_blank">免费注册</a></p>
    </div>
  </div>

  <!-- Logged In State -->
  <div id="logged-in" class="state" style="display:none;">
    <div class="user-bar">
      <span class="user-icon">👤</span>
      <span id="user-email" class="user-email">user@example.com</span>
    </div>

    <div class="plan-badge" id="plan-badge">免费版</div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="stat-today">0</span>
        <span class="stat-label">今日生成</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-remaining">20</span>
        <span class="stat-label">剩余次数</span>
      </div>
    </div>

    <div class="actions">
      <button id="btn-open-app" class="btn-secondary">📊 打开管理后台</button>
    </div>

    <div class="platform-hint">
      <p>💡 支持以下平台自动识别：</p>
      <div class="platforms">
        <span>🛒 淘宝</span>
        <span>🎵 抖音</span>
        <span>📱 拼多多</span>
        <span>🏪 京东</span>
      </div>
      <p style="font-size:11px;color:#999;margin-top:8px;">
        打开商家后台 → 查看评论 → 点"✨ AI回复"
      </p>
    </div>

    <button id="btn-logout" class="btn-ghost">退出登录</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
