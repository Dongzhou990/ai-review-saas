<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口碑助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <span class="popup-logo">🤖</span>
      <h1>口碑助手</h1>
      <span class="popup-version">v2.0</span>
    </div>
    <p class="popup-desc">AI门店口碑运营插件</p>
    
    <div class="popup-status" id="status">
      <span class="status-dot"></span>
      <span id="statusText">检测中...</span>
    </div>

    <div class="popup-actions">
      <button id="btnOpenApp" class="btn-primary">打开网页版</button>
      <button id="btnHowTo" class="btn-secondary">使用说明</button>
    </div>

    <div class="popup-platforms">
      <p class="platforms-title">支持的平台：</p>
      <div class="platform-tags">
        <span>美团</span><span>大众点评</span><span>携程</span>
        <span>去哪儿</span><span>飞猪</span>
      </div>
    </div>

    <div class="popup-footer">
      <a href="http://localhost:3459" target="_blank">打开口碑助手网页版 →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
